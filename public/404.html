<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | LMN3</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid #f3f4f6;
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .nav-brand img { width: 32px; height: 32px; }
    .nav-brand span {
      font-size: 1.25rem;
      font-weight: 700;
      color: #EA3E3A;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 48px;
    }
    .content {
      text-align: center;
      max-width: 576px;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #EA3E3A;
      line-height: 1;
      margin-bottom: 16px;
    }
    @media (min-width: 768px) {
      .code { font-size: 8rem; }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
    }
    @media (min-width: 768px) {
      h1 { font-size: 1.875rem; }
    }
    p {
      font-size: 1.125rem;
      color: #4b5563;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }
    @media (min-width: 640px) {
      .buttons { flex-direction: row; }
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 6px;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: opacity 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(90deg, #EA3E3A, #F4A42C);
      color: #ffffff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover {
      color: #EA3E3A;
      border-color: #EA3E3A;
    }
    footer {
      background: #111827;
      color: #9ca3af;
      text-align: center;
      padding: 32px 24px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <img src="/lovable-uploads/ac928757-746d-4571-b2f0-de32e4c5470e.png" alt="LMN3 Logo">
        <span>LMN3</span>
      </a>
    </div>
  </nav>

  <main>
    <div class="content">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on course.</p>
      <div class="buttons">
        <a href="/" class="btn btn-primary">Go Home</a>
        <a href="/contact" class="btn btn-secondary">Contact Us</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; LMN3. All rights reserved.</p>
  </footer>
</body>
</html>
